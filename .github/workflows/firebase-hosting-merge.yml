# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      buildType:
        description: 'Build type'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - development

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cschleiden/replace-tokens@v1.3
        with:
          files: '["**/firebase-options.ts"]'
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      - run: npm ci --legacy-peer-deps && npm run build:${{ github.event.inputs.buildType || 'production' }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ENVET_EN_CASA }}
          channelId: live
          projectId: envet-en-casa
